{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto mt-10 mb-20">
    <div class="mb-8 flex justify-between items-center">
        <h1 class="text-3xl font-bold text-gray-900">Account Settings</h1>
        <a href="{{ url_for('dashboard') }}" class="text-indigo-600 hover:text-indigo-800 font-medium transition">&larr; Back to Dashboard</a>
    </div>

    <div class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
        <form action="{{ url_for('settings') }}" method="POST">
            <div class="p-8 border-b border-gray-200">
                <h2 class="text-xl font-semibold text-gray-800 mb-6">Company Profile</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label for="company_name" class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                        <input type="text" name="company_name" id="company_name" value="{{ current_user.company_name or '' }}" class="shadow-sm border border-gray-300 rounded-md w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div class="md:col-span-2">
                        <label for="company_address" class="block text-sm font-medium text-gray-700 mb-1">Company Address</label>
                        <textarea name="company_address" id="company_address" rows="3" class="shadow-sm border border-gray-300 rounded-md w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">{{ current_user.company_address or '' }}</textarea>
                    </div>

                    <div>
                        <label for="company_email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" name="company_email" id="company_email" value="{{ current_user.company_email or '' }}" class="shadow-sm border border-gray-300 rounded-md w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label for="company_phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                        <input type="tel" name="company_phone" id="company_phone" value="{{ current_user.company_phone or '' }}" class="shadow-sm border border-gray-300 rounded-md w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>
            </div>

            <div class="p-8 border-b border-gray-200 bg-gray-50">
                <h2 class="text-xl font-semibold text-gray-800 mb-6">Invoice Defaults</h2>
                
                <div class="space-y-6">
                    <div>
                        <label for="payment_instructions" class="block text-sm font-medium text-gray-700 mb-1">Payment Instructions</label>
                        <p class="text-sm text-gray-500 mb-2">This text will appear in the footer of your generated invoices.</p>
                        <textarea name="payment_instructions" id="payment_instructions" rows="3" class="shadow-sm border border-gray-300 rounded-md w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">{{ current_user.payment_instructions or '' }}</textarea>
                    </div>

                    <div>
                        <label for="invoice_notes" class="block text-sm font-medium text-gray-700 mb-1">Invoice Notes (Thank You Note)</label>
                        <p class="text-sm text-gray-500 mb-2">Additional notes displayed below the payment instructions.</p>
                        <textarea name="invoice_notes" id="invoice_notes" rows="2" class="shadow-sm border border-gray-300 rounded-md w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">{{ current_user.invoice_notes or '' }}</textarea>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-white flex justify-end">
                <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
