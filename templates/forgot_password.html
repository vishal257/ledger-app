{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden md:max-w-md mt-10">
    <div class="p-8">
        <div class="uppercase tracking-wide text-sm text-indigo-500 font-semibold mb-1">Reset Password</div>
        <h2 class="block mt-1 text-lg leading-tight font-medium text-black mb-4">Forgot your password?</h2>
        <p class="text-sm text-gray-600 mb-6">Enter your username below and we will securely generate a password reset link for you.</p>
        
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="mb-6">
                <label for="username" class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                <input type="text" name="username" id="username" required class="shadow-sm appearance-none border border-gray-300 rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            
            <div class="flex items-center justify-between">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full transition duration-150 ease-in-out">
                    Request Reset Link
                </button>
            </div>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">Remember your password? <a href="{{ url_for('login') }}" class="text-indigo-600 hover:text-indigo-500 font-medium">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
